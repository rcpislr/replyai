version: '3.8'

services:
  # NGINX Reverse Proxy (Main Entry Point)
  nginx:
    image: nginx:alpine
    container_name: replyai-nginx
    ports:
      - "3005:3005"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - postgres
      - redis
      - qdrant
    networks:
      - replyai-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3005/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: replyai-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: replyai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - replyai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: replyai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - replyai-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: replyai-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - replyai-net

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  replyai-net:
    driver: bridge

version: '3.8'

services:
  # NGINX Reverse Proxy (Main Entry Point)
  nginx:
    image: nginx:alpine
    container_name: replyai-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - dashboard
      - admin
      - web
      - postgres
      - redis
    networks:
      - replyai-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Server
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: replyai-api
    environment:
      PORT: 3001
      NODE_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
      QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - replyai-net
    restart: unless-stopped
    volumes:
      - ./apps/api/.env.production:/app/.env

  # Dashboard
  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    container_name: replyai-dashboard
    environment:
      NEXT_PUBLIC_API_URL: /api
    networks:
      - replyai-net
    restart: unless-stopped

  # Admin Panel
  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    container_name: replyai-admin
    environment:
      NEXT_PUBLIC_API_URL: /api
    networks:
      - replyai-net
    restart: unless-stopped

  # Marketing Website
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: replyai-web
    networks:
      - replyai-net
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: replyai-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: replyai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - replyai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: replyai-redis
    volumes:
      - redis_data:/data
    networks:
      - replyai-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Qdrant Vector DB
  qdrant:
    image: qdrant/qdrant:latest
    container_name: replyai-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - replyai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  replyai-net:
    driver: bridge
